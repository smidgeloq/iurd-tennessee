<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IURD Tennessee</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Segoe UI', sans-serif;
    min-height:100vh;

    background:
        linear-gradient(
            rgba(255,255,255,0.82),
            rgba(255,255,255,0.82)
        ),
        url('church.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;

    background:rgba(255,255,255,0.92);

    backdrop-filter:blur(8px);

    border-radius:25px;

    padding:40px 30px;

    box-shadow:0 15px 40px rgba(0,0,0,0.15);

    text-align:center;
}

.logo{
    width:90px;
    margin-bottom:15px;
}

h1{
    color:#1d3557;
    margin-bottom:10px;
    font-size:2rem;
}

.subtitle{
    color:#555;
    margin-bottom:30px;
    line-height:1.5;
}

.button{
    display:block;

    background:#1d3557;

    color:white;

    text-decoration:none;

    padding:16px;

    margin-bottom:15px;

    border-radius:12px;

    font-size:18px;

    font-weight:600;

    transition:.3s;
}

.button:hover{
    transform:translateY(-2px);
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

```

</a>

<a class="button"

   👍 Facebook
</a>

<a class="button"
   href="https://chat.whatsapp.com/LMf8GuBwpes4jOpINGyIIg"

</a>

<a class="button"
   href="https://universalchurchusa.org/es/"

</a>

<div class="footer">
    Iglesia Universal del Reino de Dios<br>

```

</div>
